# Alembic 配置（PostgreSQL/PostGIS 模式下使用）
# 数据库 URL 由 env.py 从 FUSION_DATABASE_URL 读取，此处仅占位。
[alembic]
script_location = app/db/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://fusion:fusion@localhost:5432/fusion

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
